<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soon.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- mi heart is generated.. just for YOU..<3 -->
    <div id="hearts-container"></div>

    <div class="center-container">
        <p class="teaser-text">Soon.</p>
        
        <!-- lightswitch -->
        <div class="switch-container" id="lightswitch" onclick="toggleLight()">
            <div class="switch-housing">
                <div class="switch-toggle"></div>
            </div>
        </div>
    </div>

    <!-- can javascript handle mi heart...? -->
    <script>
        const container = document.getElementById('hearts-container');

        function toggleLight() {
            const isLightMode = document.body.classList.toggle('light-mode');
            
            if (isLightMode) {
                // it's mi heart.. how beautiful, don't YOU think?
                createHearts(40);
            } else {
                // aww.. that's it..?
                container.innerHTML = '';
            }
        }

        function createHearts(count) {
            container.innerHTML = '';
            
            for (let i = 0; i < count; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerText = '♡';
                
                heart.style.left = Math.random() * -20 + 'vw'; 
                heart.style.top = Math.random() * 100 + 'vh';
                
                // they can change size!! wow!!!!
                const size = Math.random() * 20 + 20; // 20px to 40px
                heart.style.fontSize = size + 'px';
                
                // delaying it.. but they will get to YOU sooner, or later..<3
                heart.style.animationDelay = Math.random() * 8 + 's';
                heart.style.animationDuration = (Math.random() * 5 + 8) + 's';
                
                container.appendChild(heart);
            }
        }
    </script>
</body>
</html>
